<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Centralist United States</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
overflow:hidden;
background:#000814 url("background.png") no-repeat center center fixed;
background-size:cover;
font-family:'Orbitron',sans-serif;
color:#ffffff;
}

/* SUPPRESSION VIDEO */
#background-video{
display:none;
}

/* OVERLAY */

#overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(120deg, rgba(0,32,91,0.6), rgba(139,0,0,0.6));
z-index:-1;
}

/* SCANLINES */

body:after{
content:"";
position:fixed;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
z-index:5;
}

/* MAIN */

#main{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* LOGO */

#logo{
width:140px;
margin-bottom:15px;
filter:drop-shadow(0 0 15px #ffffff);
}

/* TITLE */

#title{
font-size:55px;
letter-spacing:5px;
color:#ffffff;
text-shadow:0 0 10px #1e90ff,0 0 25px #ff0000;
}

/* SUBTITLE */

#subtitle{
font-size:16px;
color:#cfd8ff;
letter-spacing:3px;
margin-bottom:40px;
font-family:'Share Tech Mono', monospace;
}

/* TERMINAL */

#terminal{
width:800px;
max-width:90%;
height:260px;
background:rgba(0,0,0,0.75);
border:2px solid #1e90ff;
box-shadow:0 0 20px #1e90ff;
padding:20px;
overflow:hidden;
text-align:left;
font-family:'Share Tech Mono', monospace;
font-size:14px;
color:#cfd8ff;
}

#line{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

/* PROGRESS */

#progress-container{
margin-top:35px;
width:400px;
max-width:80%;
height:18px;
border:1px solid #ffffff;
background:rgba(0,0,0,0.6);
}

#progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#1e90ff,#ffffff,#ff0000);
box-shadow:0 0 10px #ffffff;
transition:width 0.3s;
}

/* STATUS */

#status{
margin-top:12px;
font-size:14px;
letter-spacing:2px;
color:#ffffff;
font-family:'Share Tech Mono', monospace;
}

/* CORNER */

#corner{
position:absolute;
bottom:20px;
left:30px;
font-size:12px;
font-family:'Share Tech Mono', monospace;
color:#ffffff;
text-align:left;
opacity:0.7;
}

</style>
</head>

<body>

<!-- VIDEO SUPPRIMÉ -->
<!-- <video id="background-video" autoplay muted loop>
<source src="loading.webm" type="video/webm">
</video> -->

<div id="overlay"></div>

<div id="main">

<img id="logo" src="logo.png">

<div id="title">CENTRALIST UNITED STATES</div>

<div id="subtitle">
https://discord.gg/bZJ7KGuMZd • National Unity • Absolute Order
</div>

<div id="terminal">
<div id="log"></div>
<span id="line">█</span>
</div>

<div id="progress-container">
<div id="progress"></div>
</div>

<div id="status">Initialisation du système...</div>

</div>

<div id="corner">
CLASSIFICATION : TOP SECRET<br>
ACCESS LEVEL : ALPHA<br>
CENTRALIST NETWORK
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

const log = document.getElementById("log")
const progress = document.getElementById("progress")
const status = document.getElementById("status")

let percent = 0

const messages = [

"Connexion au réseau central...",
"Authentification des citoyens...",
"Chargement des bases...",
"Synchronisation des forces armées...",
"Activation des protocoles de sécurité...",
"Chargement des unités...",
"Synchronisation des données nationales...",
"Stabilisation du système...",
"Connexion sécurisée...",
"Bienvenue, citoyen."

]

let i = 0

function addLine(text){
log.innerHTML += text + "<br>"
log.scrollTop = log.scrollHeight
}

function load(){

if(percent < 100){

percent += Math.random()*7
progress.style.width = percent+"%"

if(i < messages.length){
addLine("> " + messages[i])
status.innerText = messages[i]
i++
}

setTimeout(load,800)

}else{
status.innerText = "Connexion établie"
}

}

load()

const music = document.getElementById("music")

setTimeout(()=>{
music.volume=0.05
music.play()
},2000)

</script>

</body>
</html>
