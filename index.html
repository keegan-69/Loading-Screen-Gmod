<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Resurgent States of America</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
overflow:hidden;
background:#050505 url("background.png") no-repeat center center fixed;
background-size:cover;
font-family:'Orbitron',sans-serif;
color:#d6d6d6;
}

/* SUPPRESSION VIDEO */
#background-video{
display:none;
}

/* OVERLAY */

#overlay{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(
120deg,
rgba(25,25,25,0.78),
rgba(80,0,0,0.72)
);
z-index:-1;
}

/* SCANLINES */

body:after{
content:"";
position:fixed;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.025),
rgba(255,255,255,0.025) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
z-index:5;
}

/* MAIN */

#main{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* LOGO */

#logo{
width:140px;
margin-bottom:15px;
filter:drop-shadow(0 0 18px #ff3b3b);
}

/* TITLE */

#title{
font-size:55px;
letter-spacing:6px;
color:#f0f0f0;
text-shadow:
0 0 12px #8b0000,
0 0 25px #ff0000,
0 0 40px #ff3b3b;
}

/* SUBTITLE */

#subtitle{
font-size:16px;
color:#c4b6b6;
letter-spacing:3px;
margin-bottom:40px;
font-family:'Share Tech Mono', monospace;
}

/* TERMINAL */

#terminal{
width:800px;
max-width:90%;
height:260px;
background:rgba(0,0,0,0.82);
border:2px solid #8b0000;
box-shadow:0 0 25px #8b0000;
padding:20px;
overflow:hidden;
text-align:left;
font-family:'Share Tech Mono', monospace;
font-size:14px;
color:#d8d8d8;
}

#line{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

/* PROGRESS */

#progress-container{
margin-top:35px;
width:400px;
max-width:80%;
height:18px;
border:1px solid #6e0000;
background:rgba(0,0,0,0.7);
}

#progress{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#300000,
#8b0000,
#ff3b3b
);
box-shadow:0 0 12px #ff0000;
transition:width 0.3s;
}

/* STATUS */

#status{
margin-top:12px;
font-size:14px;
letter-spacing:2px;
color:#d0d0d0;
font-family:'Share Tech Mono', monospace;
}

/* CORNER */

#corner{
position:absolute;
bottom:20px;
left:30px;
font-size:12px;
font-family:'Share Tech Mono', monospace;
color:#b8b8b8;
text-align:left;
opacity:0.75;
}

</style>
</head>

<body>

<div id="overlay"></div>

<div id="main">

<img id="logo" src="logo.png">

<div id="title">RESURGENT STATES OF AMERICA</div>

<div id="subtitle">
discord.gg/qrTTKKV2xN • Rebuild Through Ashes • The Old World Is Dead
</div>

<div id="terminal">
<div id="log"></div>
<span id="line">█</span>
</div>

<div id="progress-container">
<div id="progress"></div>
</div>

<div id="status">Réactivation du réseau survivant...</div>

</div>

<div id="corner">
CLASSIFICATION : EPSILON<br>
ADMINISTRATION ACCESS ONLY<br>
R.S.A RECLAMATION NETWORK
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

const log = document.getElementById("log")
const progress = document.getElementById("progress")
const status = document.getElementById("status")

let percent = 0

const messages = [

"Connexion aux relais abandonnés...",
"Recherche des colonies survivantes...",
"Authentification des citoyens rescapés...",
"Synchronisation des bunkers fédéraux...",
"Réactivation des défenses nationales...",
"Chargement des archives pré-effondrement...",
"Déploiement des unités de récupération...",
"Stabilisation des zones sécurisées...",
"Restauration des communications continentales...",
"Bienvenue dans les Resurgent States."

]

let i = 0

function addLine(text){
log.innerHTML += text + "<br>"
log.scrollTop = log.scrollHeight
}

function load(){

if(percent < 100){

percent += Math.random()*7
progress.style.width = percent+"%"

if(i < messages.length){
addLine("> " + messages[i])
status.innerText = messages[i]
i++
}

setTimeout(load,800)

}else{
status.innerText = "Connexion établie au réseau RSA"
}

}

load()

const music = document.getElementById("music")

setTimeout(()=>{
music.volume=0.05
music.play()
},2000)

</script>

</body>
</html>
